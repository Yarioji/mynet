<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Звонок — MyNet</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #080810;
    --bg2:     #0f0f18;
    --bg3:     #17171f;
    --border:  #252535;
    --accent:  #00e5a0;
    --accent2: #00b87a;
    --text:    #e0e0f0;
    --text2:   #7070a0;
    --text3:   #404060;
    --danger:  #ff3355;
    --warn:    #ffb020;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    overflow: hidden;
  }

  /* ── LAYOUT ────────────────────────────── */
  #call-container {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── HEADER ────────────────────────────── */
  .call-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .call-header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .call-logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
  }

  .call-title {
    font-size: 13px;
    color: var(--text2);
    font-family: 'IBM Plex Mono', monospace;
  }

  .call-timer {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: var(--accent);
    letter-spacing: .1em;
  }

  /* ── VIDEO GRID ────────────────────────── */
  #video-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 2px;
    background: var(--bg);
    overflow: hidden;
    position: relative;
  }

  .video-tile {
    position: relative;
    background: var(--bg2);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 200px;
  }

  .video-tile video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .video-tile.audio-only video {
    display: none;
  }

  /* Avatar placeholder when no video */
  .tile-avatar {
    width: 80px;
    height: 80px;
    background: var(--bg3);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    color: var(--accent);
    flex-direction: column;
    gap: 8px;
  }

  .tile-label {
    position: absolute;
    bottom: 10px;
    left: 12px;
    background: rgba(0,0,0,.65);
    padding: 3px 10px;
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tile-label .muted-icon {
    color: var(--danger);
    font-size: 10px;
  }

  /* Speaking indicator */
  .tile-speaking::after {
    content: '';
    position: absolute;
    inset: 0;
    border: 2px solid var(--accent);
    pointer-events: none;
    animation: speakPulse 1s ease infinite;
  }

  @keyframes speakPulse {
    0%, 100% { opacity: .6; }
    50%       { opacity: 1; }
  }

  /* Screen share overlay */
  #screen-share-tile {
    display: none;
    position: absolute;
    inset: 0;
    background: var(--bg);
    z-index: 10;
  }

  #screen-share-tile.show { display: flex; flex-direction: column; }

  #screen-share-tile video {
    flex: 1;
    width: 100%;
    object-fit: contain;
  }

  .screen-share-bar {
    padding: 6px 14px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    font-size: 12px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .screen-dot {
    width: 8px; height: 8px;
    background: var(--danger);
    border-radius: 50%;
    animation: blink 1.4s ease infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: .2; }
  }

  /* ── CONTROLS ──────────────────────────── */
  .call-controls {
    padding: 16px 24px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .ctrl-btn {
    width: 52px; height: 52px;
    border-radius: 0;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
    position: relative;
  }

  .ctrl-btn:hover { border-color: var(--text2); }
  .ctrl-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }
  .ctrl-btn.danger { background: var(--danger); border-color: var(--danger); color: #fff; }
  .ctrl-btn.danger:hover { background: #cc2244; }
  .ctrl-btn.off { border-color: var(--danger); }

  .ctrl-label {
    position: absolute;
    bottom: -18px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text3);
    white-space: nowrap;
  }

  .controls-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .controls-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  /* ── CONNECTING STATE ───────────────────── */
  #connecting-overlay {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 50;
  }

  #connecting-overlay.hidden { display: none; }

  .connecting-spinner {
    width: 48px; height: 48px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .connecting-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: var(--text2);
  }

  .connecting-name {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }

  /* ── STATUS BAR ─────────────────────────── */
  #status-bar {
    padding: 5px 20px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text3);
    display: flex;
    gap: 20px;
  }

  .status-item { display: flex; align-items: center; gap: 5px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .status-dot.green { background: var(--accent); }
  .status-dot.red   { background: var(--danger); }
  .status-dot.gray  { background: var(--text3); }
</style>
</head>
<body>

<div id="call-container">

  <!-- HEADER -->
  <div class="call-header">
    <div class="call-header-left">
      <div class="call-logo">my_net</div>
      <div class="call-title" id="call-title">// звонок</div>
    </div>
    <div class="call-timer" id="call-timer">00:00</div>
  </div>

  <!-- STATUS BAR -->
  <div id="status-bar">
    <div class="status-item">
      <div class="status-dot gray" id="ws-dot"></div>
      <span id="ws-status">соединение...</span>
    </div>
    <div class="status-item">
      <div class="status-dot gray" id="media-dot"></div>
      <span id="media-status">медиа...</span>
    </div>
  </div>

  <!-- VIDEO GRID -->
  <div id="video-grid">
    <!-- Connecting overlay -->
    <div id="connecting-overlay">
      <div class="connecting-spinner"></div>
      <div class="connecting-name" id="connecting-name">—</div>
      <div class="connecting-text">установка соединения...</div>
    </div>

    <!-- Screen share overlay -->
    <div id="screen-share-tile">
      <video id="screen-share-video" autoplay playsinline></video>
      <div class="screen-bar">
        <div class="screen-dot"></div>
        <span id="screen-share-label">Трансляция экрана</span>
      </div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div class="call-controls">
    <div class="controls-wrap">
      <div class="controls-row">
        <div style="position:relative">
          <button class="ctrl-btn" id="btn-mic" onclick="toggleMic()" title="Микрофон">🎤</button>
          <span class="ctrl-label">микрофон</span>
        </div>
        <div style="position:relative">
          <button class="ctrl-btn" id="btn-cam" onclick="toggleCam()" title="Камера">📷</button>
          <span class="ctrl-label">камера</span>
        </div>
        <div style="position:relative">
          <button class="ctrl-btn" id="btn-screen" onclick="toggleScreenShare()" title="Экран">🖥</button>
          <span class="ctrl-label">экран</span>
        </div>
        <div style="position:relative; margin: 0 12px;">
          <button class="ctrl-btn danger" onclick="hangUp()" title="Завершить">✕</button>
          <span class="ctrl-label">завершить</span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  PARAMS from URL
// ═══════════════════════════════════════════
const params   = new URLSearchParams(location.search);
const API      = params.get('api')    || window.location.origin;
const TOKEN    = params.get('token')  || '';
const CHAT_ID  = parseInt(params.get('chat_id'));
const CALL_TYPE = params.get('type') || 'audio'; // audio | video
const MY_NAME  = decodeURIComponent(params.get('name') || 'Вы');
const CHAT_NAME = decodeURIComponent(params.get('chat_name') || 'Звонок');

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let ws = null;
let localStream = null;
let screenStream = null;
let peers = {};       // peer_id -> RTCPeerConnection
let timerInterval = null;
let seconds = 0;
let micOn = true;
let camOn = CALL_TYPE === 'video';
let screenSharing = false;
let myUserId = null;

const ICE_SERVERS = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    {
      urls: 'turn:openrelay.metered.ca:80',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    },
    {
      urls: 'turn:openrelay.metered.ca:443',
      username: 'openrelayproject',
      credential: 'openrelayproject'
    }
  ]
};

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
document.getElementById('call-title').textContent = `// ${CHAT_NAME}`;
document.getElementById('connecting-name').textContent = CHAT_NAME;

async function init() {
  // Получаем свой ID
  try {
    const me = await fetch(API + '/api/users/me', {
      headers: { Authorization: 'Bearer ' + TOKEN }
    }).then(r => r.json());
    myUserId = me.id;
  } catch {
    setStatus('ws', false, 'ошибка авторизации');
    return;
  }

  // Получаем медиа
  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: true,
      video: CALL_TYPE === 'video'
    });
    setStatus('media', true, 'медиа получено');
    addLocalTile(localStream);
    if (!camOn) muteVideoTracks();
  } catch (e) {
    // Только аудио fallback
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      camOn = false;
      setStatus('media', true, 'только аудио');
      addLocalTile(localStream);
    } catch {
      setStatus('media', false, 'нет доступа к медиа');
    }
  }

  connectSignaling();
}

// ═══════════════════════════════════════════
//  SIGNALING WS
// ═══════════════════════════════════════════
function connectSignaling() {
  const url = API.replace(/^https/, 'wss').replace(/^http/, 'ws') + '/ws/call/' + CHAT_ID + '?token=' + TOKEN;
  ws = new WebSocket(url);

  ws.onopen = () => setStatus('ws', true, 'сигнал OK');

  ws.onmessage = async (e) => {
    const data = JSON.parse(e.data);
    await handleSignal(data);
  };

  ws.onerror = () => setStatus('ws', false, 'ошибка WS');
  ws.onclose = () => setStatus('ws', false, 'WS закрыт');
}

async function handleSignal(data) {
  const { type, from_id, from_name } = data;

  if (type === 'joined') {
    myUserId = data.user_id;
    // Если в комнате уже есть люди — инициируем оффер каждому
    for (const peerId of data.peers) {
      await createPeer(peerId, true);
    }
    if (data.peers.length > 0) hideConnecting();
    else {
      // Ждём других
    }
  }

  else if (type === 'peer_joined') {
    // Входящий участник — он сам нам пришлёт offer
    // Просто создаём peer заранее
    await createPeer(from_id, false, from_name);
    hideConnecting();
    startTimer();
  }

  else if (type === 'offer') {
    let pc = peers[from_id];
    if (!pc) pc = await createPeer(from_id, false, from_name);
    await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    signal({ type: 'answer', sdp: answer, target_id: from_id });
    hideConnecting();
    startTimer();
  }

  else if (type === 'answer') {
    const pc = peers[from_id];
    if (pc) await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
  }

  else if (type === 'ice-candidate') {
    const pc = peers[from_id];
    if (pc && data.candidate) {
      try { await pc.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch {}
    }
  }

  else if (type === 'peer_left') {
    removePeer(from_id);
  }

  else if (type === 'screen-share-start') {
    showRemoteScreenShare(data.from_name || from_id);
  }

  else if (type === 'screen-share-stop') {
    hideRemoteScreenShare();
  }
}

// ═══════════════════════════════════════════
//  PEER CONNECTION
// ═══════════════════════════════════════════
async function createPeer(peerId, isInitiator, peerName) {
  const pc = new RTCPeerConnection(ICE_SERVERS);
  peers[peerId] = pc;

  // Добавляем локальные треки
  if (localStream) {
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  }

  // ICE
  pc.onicecandidate = (e) => {
    if (e.candidate) {
      signal({ type: 'ice-candidate', candidate: e.candidate, target_id: peerId });
    }
  };

  // Входящие треки — рендерим
  pc.ontrack = (e) => {
    const stream = e.streams[0];
    addRemoteTile(peerId, stream, peerName || ('Участник ' + peerId));
  };

  pc.onconnectionstatechange = () => {
    if (['disconnected', 'failed', 'closed'].includes(pc.connectionState)) {
      removePeer(peerId);
    }
  };

  // Если мы инициатор — отправляем offer
  if (isInitiator) {
    const offer = await pc.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: true });
    await pc.setLocalDescription(offer);
    signal({ type: 'offer', sdp: offer, target_id: peerId });
  }

  return pc;
}

function removePeer(peerId) {
  if (peers[peerId]) {
    peers[peerId].close();
    delete peers[peerId];
  }
  const tile = document.getElementById('tile-' + peerId);
  if (tile) tile.remove();

  if (Object.keys(peers).length === 0) stopTimer();
}

// ═══════════════════════════════════════════
//  VIDEO TILES
// ═══════════════════════════════════════════
function addLocalTile(stream) {
  const grid = document.getElementById('video-grid');
  const tile = document.createElement('div');
  tile.className = 'video-tile' + (CALL_TYPE !== 'video' ? ' audio-only' : '');
  tile.id = 'tile-local';

  const video = document.createElement('video');
  video.autoplay = true;
  video.muted = true; // Свой звук не слышим
  video.playsInline = true;
  video.srcObject = stream;
  tile.appendChild(video);

  const avatar = document.createElement('div');
  avatar.className = 'tile-avatar';
  avatar.textContent = MY_NAME[0].toUpperCase();
  tile.appendChild(avatar);

  const label = document.createElement('div');
  label.className = 'tile-label';
  label.innerHTML = `<span>${MY_NAME} (вы)</span>`;
  tile.appendChild(label);

  grid.appendChild(tile);
}

function addRemoteTile(peerId, stream, name) {
  const grid = document.getElementById('video-grid');
  let tile = document.getElementById('tile-' + peerId);

  if (!tile) {
    tile = document.createElement('div');
    tile.id = 'tile-' + peerId;
    tile.className = 'video-tile';
    grid.appendChild(tile);
  }

  tile.innerHTML = '';

  const video = document.createElement('video');
  video.autoplay = true;
  video.playsInline = true;
  video.srcObject = stream;
  tile.appendChild(video);

  // Проверяем есть ли видео трек
  const hasVideo = stream.getVideoTracks().length > 0;
  if (!hasVideo) tile.classList.add('audio-only');

  const avatar = document.createElement('div');
  avatar.className = 'tile-avatar';
  avatar.textContent = (name || '?')[0].toUpperCase();
  tile.appendChild(avatar);

  const label = document.createElement('div');
  label.className = 'tile-label';
  label.innerHTML = `<span>${esc(name)}</span>`;
  tile.appendChild(label);
}

// ═══════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════
function toggleMic() {
  if (!localStream) return;
  micOn = !micOn;
  localStream.getAudioTracks().forEach(t => t.enabled = micOn);
  const btn = document.getElementById('btn-mic');
  btn.classList.toggle('off', !micOn);
  btn.title = micOn ? 'Выключить микрофон' : 'Включить микрофон';
}

function toggleCam() {
  if (!localStream) return;
  camOn = !camOn;
  localStream.getVideoTracks().forEach(t => t.enabled = camOn);
  const btn = document.getElementById('btn-cam');
  btn.classList.toggle('off', !camOn);
  btn.title = camOn ? 'Выключить камеру' : 'Включить камеру';
  const tile = document.getElementById('tile-local');
  if (tile) tile.classList.toggle('audio-only', !camOn);
}

function muteVideoTracks() {
  if (!localStream) return;
  localStream.getVideoTracks().forEach(t => t.enabled = false);
  const tile = document.getElementById('tile-local');
  if (tile) tile.classList.add('audio-only');
}

async function toggleScreenShare() {
  if (!screenSharing) {
    await startScreenShare();
  } else {
    stopScreenShare();
  }
}

async function startScreenShare() {
  try {
    screenStream = await navigator.mediaDevices.getDisplayMedia({
      video: { cursor: 'always' },
      audio: false
    });

    screenSharing = true;
    document.getElementById('btn-screen').classList.add('active');

    // Показываем своё превью
    const tile = document.getElementById('screen-share-tile');
    const video = document.getElementById('screen-share-video');
    video.srcObject = screenStream;
    video.muted = true;
    document.getElementById('screen-share-label').textContent = 'Вы транслируете экран';
    tile.classList.add('show');

    // Заменяем видео трек в каждом peer connection
    const screenTrack = screenStream.getVideoTracks()[0];
    for (const pc of Object.values(peers)) {
      const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
      if (sender) {
        sender.replaceTrack(screenTrack);
      } else {
        pc.addTrack(screenTrack, screenStream);
      }
    }

    // Сигналим остальным
    signal({ type: 'screen-share-start' });

    // Автоостановка при закрытии системного диалога
    screenTrack.onended = () => stopScreenShare();

  } catch (e) {
    if (e.name !== 'NotAllowedError') {
      alert('Не удалось захватить экран: ' + e.message);
    }
  }
}

function stopScreenShare() {
  if (!screenSharing) return;
  screenSharing = false;
  document.getElementById('btn-screen').classList.remove('active');
  document.getElementById('screen-share-tile').classList.remove('show');

  if (screenStream) {
    screenStream.getTracks().forEach(t => t.stop());
    screenStream = null;
  }

  // Возвращаем камеру если была
  if (localStream) {
    const camTrack = localStream.getVideoTracks()[0];
    if (camTrack) {
      for (const pc of Object.values(peers)) {
        const sender = pc.getSenders().find(s => s.track && s.track.kind === 'video');
        if (sender) sender.replaceTrack(camTrack);
      }
    }
  }

  signal({ type: 'screen-share-stop' });
}

function showRemoteScreenShare(fromName) {
  // Когда кто-то другой начал трансляцию — она придёт через видео трек
  document.getElementById('screen-share-label').textContent = (fromName || 'Участник') + ' транслирует экран';
  document.getElementById('screen-share-tile').classList.add('show');
}

function hideRemoteScreenShare() {
  document.getElementById('screen-share-tile').classList.remove('show');
}

function hangUp() {
  signal({ type: 'hang_up' });
  cleanup();
  window.close();
}

function cleanup() {
  stopTimer();
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); }
  if (screenStream) { screenStream.getTracks().forEach(t => t.stop()); }
  for (const pc of Object.values(peers)) pc.close();
  if (ws) ws.close();
}

// ═══════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════
function signal(data) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(data));
  }
}

function hideConnecting() {
  document.getElementById('connecting-overlay').classList.add('hidden');
}

function startTimer() {
  if (timerInterval) return;
  seconds = 0;
  timerInterval = setInterval(() => {
    seconds++;
    const m = String(Math.floor(seconds / 60)).padStart(2, '0');
    const s = String(seconds % 60).padStart(2, '0');
    document.getElementById('call-timer').textContent = m + ':' + s;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function setStatus(type, ok, text) {
  const dot = document.getElementById(type + '-dot');
  const label = document.getElementById(type + '-status');
  dot.className = 'status-dot ' + (ok ? 'green' : 'red');
  label.textContent = text;
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Cleanup on close
window.addEventListener('beforeunload', cleanup);

// Start
init();
</script>
</body>
</html>
